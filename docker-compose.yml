version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mypharma-backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DEBUG=false
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=mypharma
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - USE_REDIS=true
      - SERVE_MEDIA=true
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
    expose:
      - "8000"
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
      - backend_logs:/app/logs
    depends_on:
      - mysql
      - redis
    networks:
      - mypharma_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
    container_name: mypharma-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - BACKEND_URL_INTERNAL=http://backend:8000
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - mypharma_network

  mysql:
    image: mysql:8.0
    container_name: mypharma-mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: mypharma
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - mypharma_network

  redis:
    image: redis:7-alpine
    container_name: mypharma-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - mypharma_network

volumes:
  backend_media:
  backend_static:
  backend_logs:
  mysql_data:
  redis_data:

networks:
  mypharma_network:
    driver: bridge
